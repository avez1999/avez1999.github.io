bio: |
  Avez Shaikh is a PhD candidate in Mechanical Engineering at Pennsylvania
  State University working at the intersection of additive manufacturing,
  computational design, inverse design, and physics-guided AI. His work
  focuses on manufacturable metamaterials, simulation-driven engineering,
  and generative design pipelines that connect machine learning with
  real manufacturing constraints.

